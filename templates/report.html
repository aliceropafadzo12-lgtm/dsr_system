<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>report</title>
</head>
<body>
    <link rel="stylesheet" href="/static/style.css">

<div class="sidebar">
    <h2>DSR System</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/add-sales">Add Sales</a>
    <a href="/report">Sales Report</a>
    <a href="/reconcile">Reconcile</a>
    <a href="/reconcile-report">Reconciliation</a>
</div>

<div class="main">
    <div class="header">
        <h2>Sales Report</h2>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Branch</th>
                    <th>Date</th>
                    <th>Cash</th>
                    <th>Swipe</th>
                    <th>Mobile</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                {% for sale in sales %}
                <tr>
                    <td>{{ sale[0] }}</td>
                    <td>{{ sale[1] }}</td>
                    <td>{{ sale[2] }}</td>
                    <td>${{ sale[3] }}</td>
                    <td>${{ sale[4] }}</td>
                    <td>${{ sale[5] }}</td>
                    <td><b>${{ sale[6] }}</b></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
<br>
<a href="/">Back Home</a>
</body>
</html>
