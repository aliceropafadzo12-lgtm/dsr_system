<!DOCTYPE html>
<html>
<head>
    <title>Reconciliation Report</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Reconciliation Report</h2>

<table border="1">
    <tr>
        <th>Date</th>
        <th>Expected</th>
        <th>Actual (PDF)</th>
        <th>Variance</th>
        <th>Action</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>

        <td>
            <a href="{{ row[3] }}" target="_blank">View PDF</a>
        </td>

        <td>{{ row[4] }}</td>

        <td>
            <a href="/delete-reconcile/{{ row[0] }}"
               onclick="return confirm('Are you sure you want to delete this record?')"
               style="color:red; text-decoration:none;">
               Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>
<br>
<a href="/" style="display:inline-block;padding:10px 15px;background:#2c3e50;
            color:#fff;text-decoration:none;border-radius:6px;">← Back Home</a>

</body>
</html>
