<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Dashboard</h1>

<div class="card-container">

    <div class="card">
        <h3>Total Sales</h3>
        <p>${{ total_sales }}</p>
    </div>

    <div class="card">
        <h3>Total Transactions</h3>
        <p>{{ total_transactions }}</p>
    </div>

    <div class="card">
        <h3>Total Variance</h3>
        <p>{{ total_variance }}</p>
    </div>

</div>

<h2>Sales Per Branch</h2>

<table>
    <tr>
        <th>Branch</th>
        <th>Total Sales</th>
    </tr>

    {% for branch in branch_data %}
    <tr>
        <td>{{ branch[0] }}</td>
        <td>{{ branch[1] }}</td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/" style="display:inline-block;padding:10px 15px;background:#2c3e50;color:#fff;text-decoration:none;border-radius:6px;">← Back Home</a>

</body>
</html>
